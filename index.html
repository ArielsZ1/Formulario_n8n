<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    h2 { margin-bottom: 20px; color: #1a1a2e; font-size: 1.3rem; }
    label { display: block; margin-bottom: 4px; font-size: 0.85rem; color: #555; }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    textarea { resize: vertical; height: 80px; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { background: #aaa; }
    #mensaje {
      margin-top: 16px;
      text-align: center;
      font-size: 0.9rem;
      color: #16a34a;
    }
    #error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h2>📋 Registro de datos</h2>

    <label>Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre">

    <label>Apellido</label>
    <input type="text" id="apellido" placeholder="Tu apellido">

    <label>Estado</label>
    <select id="estado">
      <option value="">-- Seleccioná --</option>
      <option value="Activo">Activo</option>
      <option value="Inactivo">Inactivo</option>
      <option value="Pendiente">Pendiente</option>
    </select>

    <label>Observaciones</label>
    <textarea id="observaciones" placeholder="Escribí algo..."></textarea>

    <button id="btnEnviar" onclick="enviarDatos()">Enviar</button>
    <p id="mensaje"></p>
  </div>

  <script>
    // ⚠️ REEMPLAZÁ esta URL con la tuya de n8n
    const WEBHOOK_URL = "https://arielsz.app.n8n.cloud/webhook/formulario-app";

    async function enviarDatos() {
      const nombre = document.getElementById("nombre").value.trim();
      const apellido = document.getElementById("apellido").value.trim();
      const estado = document.getElementById("estado").value;
      const observaciones = document.getElementById("observaciones").value.trim();
      const mensaje = document.getElementById("mensaje");
      const btn = document.getElementById("btnEnviar");

      // Validación básica
      if (!nombre || !apellido || !estado) {
        mensaje.className = ""; 
        mensaje.id = "error";
        mensaje.textContent = "⚠️ Completá nombre, apellido y estado.";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Enviando...";
      mensaje.textContent = "";

      try {
        const respuesta = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            nombre,
            apellido,
            estado,
            observaciones,
            fecha: new Date().toLocaleString("es-AR")
          })
        });

        if (respuesta.ok) {
          mensaje.id = "mensaje";
          mensaje.textContent = "✅ Datos enviados correctamente.";
          // Limpia el formulario
          ["nombre","apellido","observaciones"].forEach(id => 
            document.getElementById(id).value = "");
          document.getElementById("estado").value = "";
        } else {
          throw new Error("Respuesta no OK");
        }
      } catch (err) {
        mensaje.id = "error";
        mensaje.textContent = "❌ Error al enviar. Verificá la conexión.";
      } finally {
        btn.disabled = false;
        btn.textContent = "Enviar";
      }
    }
  </script>
</body>
</html>
